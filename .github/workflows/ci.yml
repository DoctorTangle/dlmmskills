name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci is unsuitable here: the @sectorone/* deps are file: links into
      # _sectorone-ref, which the pinned preinstall bootstrap clones at install
      # time. npm install runs that bootstrap + builds the SDK.
      - name: Install (clones pinned SectorOne SDK, builds it)
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Blocking gate: fail the build on critical vulnerabilities in the
      # production dependency tree (the actual agent runtime/attack surface).
      # This is green today. Dev-only advisories (e.g. the vitest UI server,
      # which CI never starts since it runs `vitest run`) are intentionally
      # excluded here so the gate stays meaningful instead of permanently red.
      - name: Audit (production deps, blocking)
        run: npm audit --omit=dev --audit-level=critical

      # Non-blocking visibility: surface the full advisory set (incl. dev deps
      # and high-severity findings inside the pinned vendored SDK) without
      # failing the build.
      - name: Audit (full, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
